#
# Axiom Labs — reusable Python CI workflow.
#
# Runs lint (ruff check + format), matrix unit tests with coverage, a
# pre-commit dry-run, and an optional provenance-pattern scan. Uploads
# coverage to Codecov on the anchor job (3.13 / ubuntu-latest).
#
# Consumer usage:
#     jobs:
#       ci:
#         uses: axiom-labs-os/.github/.github/workflows/python-ci.yml@v1
#         with:
#           package-name: dendra
#           python-versions: '["3.10","3.11","3.12","3.13"]'
#           extras: 'dev,train,viz'
#           provenance-forbidden-patterns: 'utexas|UT Austin|bbooth@'

name: python-ci

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Package import name (for coverage --cov=<name>).'
        type: string
        required: true
      python-versions:
        description: 'JSON array of Python versions for the test matrix.'
        type: string
        default: '["3.11","3.12","3.13"]'
      os-list:
        description: 'JSON array of runner OSes for the test matrix.'
        type: string
        default: '["ubuntu-latest"]'
      extras:
        description: 'Comma-separated extras passed to `pip install -e .[<extras>]`.'
        type: string
        default: 'dev'
      lint-paths:
        description: 'Paths for `ruff check` and `ruff format --check`.'
        type: string
        default: 'src/ tests/'
      coverage:
        description: 'Upload coverage from the 3.13/ubuntu anchor job.'
        type: boolean
        default: true
      codecov-token-secret:
        description: 'Name of the repo secret holding the Codecov token.'
        type: string
        default: 'CODECOV_TOKEN'
      run-pre-commit:
        description: 'Run `pre-commit run --all-files` as a separate job.'
        type: boolean
        default: true
      provenance-forbidden-patterns:
        description: 'Regex of strings that must not appear in provenance-paths (empty = skip).'
        type: string
        default: ''
      provenance-paths:
        description: 'Paths scanned for forbidden patterns.'
        type: string
        default: 'src/ tests/ docs/ README.md'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install ruff
      - run: ruff check ${{ inputs.lint-paths }}
      - run: ruff format --check ${{ inputs.lint-paths }}

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        os: ${{ fromJSON(inputs.os-list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[${{ inputs.extras }}]'
      - name: Run tests with coverage
        run: |
          pytest tests/ \
              --cov=${{ inputs.package-name }} \
              --cov-report=xml \
              --cov-report=term-missing \
              -v
      - name: Upload coverage
        if: inputs.coverage && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets[inputs.codecov-token-secret] }}

  pre-commit:
    name: Pre-commit
    if: inputs.run-pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: pre-commit/action@v3.0.1

  provenance:
    name: Provenance scan
    if: inputs.provenance-forbidden-patterns != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on forbidden patterns
        run: |
          if grep -rEn "${{ inputs.provenance-forbidden-patterns }}" \
              ${{ inputs.provenance-paths }} 2>/dev/null; then
            echo "::error::forbidden pattern(s) found in tracked sources"
            exit 1
          fi
          echo "provenance clean: no forbidden patterns in ${{ inputs.provenance-paths }}"
