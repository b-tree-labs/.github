<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph / social card template, 1200×630.
     Export to PNG for og:image. -->
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f8f6f1"/>
  <!-- Faint grid of +'s signaling "axioms as foundational points" -->
  <g stroke="#d8d3c9" stroke-width="2" stroke-linecap="square">
    <g transform="translate(150, 150)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(300, 150)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(150, 300)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(300, 300)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(150, 450)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(300, 450)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(1050, 150)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
    <g transform="translate(1050, 450)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
  </g>
  <!-- Mark, large, centered -->
  <g transform="translate(440, 155) scale(0.625)">
    <line x1="86" y1="256" x2="396" y2="256"
          stroke="#1a1a1f" stroke-width="34"
          stroke-linecap="square"/>
    <line x1="256" y1="96" x2="256" y2="406"
          stroke="#1a1a1f" stroke-width="34"
          stroke-linecap="square"/>
    <circle cx="256" cy="256" r="28" fill="#1a1a1f"/>
    <line x1="396" y1="256" x2="426" y2="256"
          stroke="#BF5700" stroke-width="34"
          stroke-linecap="square"/>
  </g>
  <!-- Wordmark below -->
  <text x="600" y="540"
        text-anchor="middle"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="500"
        font-size="56"
        letter-spacing="11"
        fill="#1a1a1f">AXIOM LABS</text>
</svg>
