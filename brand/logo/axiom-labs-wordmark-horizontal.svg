<?xml version="1.0" encoding="UTF-8"?>
<!-- Horizontal wordmark: mark + "AXIOM LABS" text.
     Font should be Space Grotesk Medium; falls back to system sans.
     For production export, outline the text (Inkscape: Path → Object to Path). -->
<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#f8f6f1"/>
  <!-- Mark, scaled to 200×200, centered vertically -->
  <g transform="translate(50, 50) scale(0.391)">
    <line x1="86" y1="256" x2="396" y2="256"
          stroke="#1a1a1f" stroke-width="34"
          stroke-linecap="square"/>
    <line x1="256" y1="96" x2="256" y2="406"
          stroke="#1a1a1f" stroke-width="34"
          stroke-linecap="square"/>
    <circle cx="256" cy="256" r="28" fill="#1a1a1f"/>
    <line x1="396" y1="256" x2="426" y2="256"
          stroke="#BF5700" stroke-width="34"
          stroke-linecap="square"/>
  </g>
  <!-- Wordmark text -->
  <text x="300" y="185"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="500"
        font-size="108"
        letter-spacing="19.4"
        fill="#1a1a1f">AXIOM LABS</text>
</svg>
